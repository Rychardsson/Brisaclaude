services:
  # ─── Banco de Dados ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: brisa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: brisa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-130680}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d brisa"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brisa-network

  # ─── Backend Spring Boot ──────────────────────────────────────────────────
  backend:
    build:
      context: ./BRISA-BACKEND
      dockerfile: Dockerfile
    container_name: brisa-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/brisa
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-130680}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-brisa-super-secret-key-change-in-production}
      BACKEND_URL: http://localhost:8082
      FRONTEND_URL: http://localhost:4300
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4300,http://127.0.0.1:4300,http://localhost:5173,http://127.0.0.1:5173,http://localhost:80,http://frontend
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_FROM: ${SPRING_MAIL_FROM:-}
      CAREER_AUTOMATION_CRON: ${CAREER_AUTOMATION_CRON:-0 0 */6 * * *}
    ports:
      - "8082:8082"
    networks:
      - brisa-network

  # ─── Frontend Vue 3 ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./BRISA-FRONTEND
      dockerfile: Dockerfile
    container_name: brisa-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8082/api}
    ports:
      - "4300:80"
    networks:
      - brisa-network

# ─── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: brisa-postgres-data

# ─── Rede ──────────────────────────────────────────────────────────────────
networks:
  brisa-network:
    name: brisa-network
    driver: bridge

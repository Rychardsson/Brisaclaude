<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Alerta BRISA — Pendência no curso</title>
</head>
<body style="margin:0; padding:0; background-color:#eaf1fb; font-family:'Segoe UI', Arial, sans-serif;">

	<div style="max-width:600px; margin:32px auto; background:#fff; border-radius:12px; padding:28px; box-shadow:0 4px 20px rgba(0,0,0,0.06);">
		<h2 style="margin:0 0 8px; color:#1F285F; font-size:22px;">Alerta de pendência no curso</h2>
		<p style="margin:0 0 16px; color:#556;">Olá <strong>${studentName}</strong>,</p>

		<p style="color:#333; line-height:1.5;">${message}</p>

		<table style="width:100%; margin-top:18px; border-collapse:collapse;">
			<tr>
				<td style="padding:8px 0; border-top:1px solid #eee; color:#666;">Curso:</td>
				<td style="padding:8px 0; border-top:1px solid #eee; color:#111;"><strong>${courseName}</strong></td>
			</tr>
			<tr>
				<td style="padding:8px 0; color:#666;">Progresso:</td>
				<td style="padding:8px 0; color:#111;"><strong>${completionPercentage}%</strong></td>
			</tr>
		</table>

		<p style="margin-top:20px; color:#999; font-size:13px;">Se você já regularizou, desconsidere esta mensagem.</p>

		<div style="margin-top:18px; text-align:right;">
			<span style="font-size:12px; color:#aaa;">Equipe BRISA</span>
		</div>
	</div>

</body>
</html>
